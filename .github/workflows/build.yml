name: Build And Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and docs dependencies
        run: |
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Generate LaTeX sources
        run: sphinx-build -M latex docs docs/_build

      - name: Build documentation PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: composition-report.tex
          working_directory: docs/_build/latex
          texlive_version: latest

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: composition-report
          path: docs/_build/latex/composition-report.pdf

  build-modus-operandi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build Modus Operandi outputs
        run: python -m modus_operandi_abjad -o build

      - name: Install FluidSynth
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Render Modus Operandi WAV
        run: ./midi2wav.sh build/modus-operandi-abjad.midi build/modus-operandi-abjad.wav

      - name: Upload Modus Operandi artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modus-operandi-abjad
          path: |
            build/modus-operandi-abjad.ly
            build/modus-operandi-abjad.pdf
            build/modus-operandi-abjad.midi
            build/modus-operandi-abjad.wav

  build-jazz-rhythms:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build Jazz Rhythms outputs
        run: python -m jazz_rhythm -o build --pdf --wav

      - name: Upload Jazz Rhythms artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jazz-rhythms
          path: |
            build/jazz-rhythms.ly
            build/jazz-rhythms.pdf
            build/jazz-rhythms.midi
            build/jazz-rhythms.wav

  build-piano-quartet-no1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Build Piano Quartet No. 1 outputs
        run: python -m algorithmic_piano_quartet_no1 -c configs/algorithmic-piano-quartet-no1.toml -o build --pdf --wav

      - name: Upload Piano Quartet No. 1 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piano-quartet-no1
          path: |
            build/algo-rhythms-quartet-no-1*.ly
            build/algo-rhythms-quartet-no-1*.pdf
            build/algo-rhythms-quartet-no-1*.midi
            build/algo-rhythms-quartet-no-1*.wav

  build-piano-quartet-no2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Build Piano Quartet No. 2 outputs
        run: python -m algorithmic_piano_quartet_no2 -c configs/algorithmic-piano-quartet-no2.toml -o build --pdf --wav

      - name: Upload Piano Quartet No. 2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piano-quartet-no2
          path: |
            build/algo-rhythms-quartet-no-2*.ly
            build/algo-rhythms-quartet-no-2*.pdf
            build/algo-rhythms-quartet-no-2*.midi
            build/algo-rhythms-quartet-no-2*.wav

  build-algorithmic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build Algorithmic scaffold outputs
        run: python -m algorithmic -o build

      - name: Upload Algorithmic scaffold artifacts
        uses: actions/upload-artifact@v4
        with:
          name: algorithmic
          path: |
            build/algorithmic.ly
            build/algorithmic.pdf
            build/algorithmic.midi

  build-art-song:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Build Art Song outputs
        run: python -m art_song -o build --pdf --midi --wav

      - name: Upload Art Song artifacts
        uses: actions/upload-artifact@v4
        with:
          name: art-song
          path: |
            build/art-song*.ly
            build/art-song*.pdf
            build/art-song.midi
            build/art-song.wav
            build/art-song-chord-voicings.md

  build-bird-im-migration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install FluidSynth
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Build Bird Im-Migration outputs
        run: |
          python -m bird_im_migration -o build --quantization 16 --pdf --midi
          python -m bird_im_migration -o build --quantization 32 --pdf --midi
          ./midi2wav.sh build/bird-im-migration-q16.midi build/bird-im-migration-q16.wav
          ./midi2wav.sh build/bird-im-migration-q32.midi build/bird-im-migration-q32.wav

      - name: Upload Bird Im-Migration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bird-im-migration
          path: |
            build/bird-im-migration-q16.ly
            build/bird-im-migration-q16.pdf
            build/bird-im-migration-q16.midi
            build/bird-im-migration-q16.wav
            build/bird-im-migration-q32.ly
            build/bird-im-migration-q32.pdf
            build/bird-im-migration-q32.midi
            build/bird-im-migration-q32.wav

  build-bird-im-migration-ensemble:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Build Bird Im-Migration Ensemble outputs
        run: python -m bird_im_migration_ensemble -o build --pdf --midi --wav

      - name: Upload Bird Im-Migration Ensemble artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bird-im-migration-ensemble
          path: |
            build/bird-im-migration-ensemble.ly
            build/bird-im-migration-ensemble.pdf
            build/bird-im-migration-ensemble.midi
            build/bird-im-migration-ensemble.wav
            build/bird-im-migration-ensemble-mvt*.wav
            build/bird-im-migration-ensemble-appendix-a*.wav

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-docs
      - build-modus-operandi
      - build-jazz-rhythms
      - build-piano-quartet-no1
      - build-piano-quartet-no2
      - build-algorithmic
      - build-art-song
      - build-bird-im-migration
      - build-bird-im-migration-ensemble
    runs-on: ubuntu-latest

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: composition-report
          path: release/docs

      - name: Download Modus Operandi artifacts
        uses: actions/download-artifact@v4
        with:
          name: modus-operandi-abjad
          path: release/modus-operandi-abjad

      - name: Download Jazz Rhythms artifacts
        uses: actions/download-artifact@v4
        with:
          name: jazz-rhythms
          path: release/jazz-rhythms

      - name: Download Piano Quartet No. 1 artifacts
        uses: actions/download-artifact@v4
        with:
          name: piano-quartet-no1
          path: release/piano-quartet-no1

      - name: Download Piano Quartet No. 2 artifacts
        uses: actions/download-artifact@v4
        with:
          name: piano-quartet-no2
          path: release/piano-quartet-no2

      - name: Download Algorithmic scaffold artifacts
        uses: actions/download-artifact@v4
        with:
          name: algorithmic
          path: release/algorithmic

      - name: Download Art Song artifacts
        uses: actions/download-artifact@v4
        with:
          name: art-song
          path: release/art-song

      - name: Download Bird Im-Migration artifacts
        uses: actions/download-artifact@v4
        with:
          name: bird-im-migration
          path: release/bird-im-migration

      - name: Download Bird Im-Migration Ensemble artifacts
        uses: actions/download-artifact@v4
        with:
          name: bird-im-migration-ensemble
          path: release/bird-im-migration-ensemble

      - name: Install thumbnail tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils imagemagick texlive-extra-utils

      - name: Create stable quartet aliases
        run: |
          set -euo pipefail
          for ext in pdf wav; do
            no1=(release/piano-quartet-no1/algo-rhythms-quartet-no-1*.${ext})
            no2=(release/piano-quartet-no2/algo-rhythms-quartet-no-2*.${ext})
            cp "${no1[0]}" "release/piano-quartet-no1/algo-rhythms-quartet-no-1.${ext}"
            cp "${no2[0]}" "release/piano-quartet-no2/algo-rhythms-quartet-no-2.${ext}"
          done

      - name: Create score thumbnails
        run: |
          set -euo pipefail

          create_thumbnail() {
            local pdf_path="$1"
            local png_path="$2"
            local base_path="${png_path%.png}"
            local cropped_pdf="${base_path}-cropped.pdf"
            local temp_path="${base_path}-page1"

            pdfcrop --margins '10 10 10 10' "${pdf_path}" "${cropped_pdf}"
            pdftoppm -png -f 1 -singlefile "${cropped_pdf}" "${temp_path}"
            if command -v magick >/dev/null 2>&1; then
              magick "${temp_path}.png" -resize 50% "${png_path}"
            else
              convert "${temp_path}.png" -resize 50% "${png_path}"
            fi
            rm -f "${cropped_pdf}"
            rm -f "${temp_path}.png"
          }

          create_thumbnail \
            "release/modus-operandi-abjad/modus-operandi-abjad.pdf" \
            "release/modus-operandi-abjad/modus-operandi-abjad-thumbnail.png"
          create_thumbnail \
            "release/jazz-rhythms/jazz-rhythms.pdf" \
            "release/jazz-rhythms/jazz-rhythms-thumbnail.png"
          create_thumbnail \
            "release/piano-quartet-no1/algo-rhythms-quartet-no-1.pdf" \
            "release/piano-quartet-no1/algo-rhythms-quartet-no-1-thumbnail.png"
          create_thumbnail \
            "release/piano-quartet-no2/algo-rhythms-quartet-no-2.pdf" \
            "release/piano-quartet-no2/algo-rhythms-quartet-no-2-thumbnail.png"
          create_thumbnail \
            "release/algorithmic/algorithmic.pdf" \
            "release/algorithmic/algorithmic-thumbnail.png"
          create_thumbnail \
            "release/art-song/art-song.pdf" \
            "release/art-song/art-song-thumbnail.png"
          create_thumbnail \
            "release/bird-im-migration/bird-im-migration-q16.pdf" \
            "release/bird-im-migration/bird-im-migration-q16-thumbnail.png"
          create_thumbnail \
            "release/bird-im-migration/bird-im-migration-q32.pdf" \
            "release/bird-im-migration/bird-im-migration-q32-thumbnail.png"
          create_thumbnail \
            "release/bird-im-migration-ensemble/bird-im-migration-ensemble.pdf" \
            "release/bird-im-migration-ensemble/bird-im-migration-ensemble-thumbnail.png"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/docs/composition-report.pdf \
            release/modus-operandi-abjad/modus-operandi-abjad.pdf \
            release/modus-operandi-abjad/modus-operandi-abjad.wav \
            release/modus-operandi-abjad/modus-operandi-abjad-thumbnail.png \
            release/jazz-rhythms/jazz-rhythms.pdf \
            release/jazz-rhythms/jazz-rhythms.wav \
            release/jazz-rhythms/jazz-rhythms-thumbnail.png \
            release/piano-quartet-no1/algo-rhythms-quartet-no-1.pdf \
            release/piano-quartet-no1/algo-rhythms-quartet-no-1.wav \
            release/piano-quartet-no1/algo-rhythms-quartet-no-1-thumbnail.png \
            release/piano-quartet-no2/algo-rhythms-quartet-no-2.pdf \
            release/piano-quartet-no2/algo-rhythms-quartet-no-2.wav \
            release/piano-quartet-no2/algo-rhythms-quartet-no-2-thumbnail.png \
            release/algorithmic/algorithmic.pdf \
            release/algorithmic/algorithmic-thumbnail.png \
            release/art-song/art-song.pdf \
            release/art-song/art-song.midi \
            release/art-song/art-song.wav \
            release/art-song/art-song-voice.pdf \
            release/art-song/art-song-violin.pdf \
            release/art-song/art-song-viola.pdf \
            release/art-song/art-song-trumpet-c.pdf \
            release/art-song/art-song-trumpet-bb.pdf \
            release/art-song/art-song-piano.pdf \
            release/art-song/art-song-chord-voicings.md \
            release/art-song/art-song-thumbnail.png \
            release/bird-im-migration/bird-im-migration-q16.pdf \
            release/bird-im-migration/bird-im-migration-q16.wav \
            release/bird-im-migration/bird-im-migration-q16-thumbnail.png \
            release/bird-im-migration/bird-im-migration-q32.pdf \
            release/bird-im-migration/bird-im-migration-q32.wav \
            release/bird-im-migration/bird-im-migration-q32-thumbnail.png \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble.pdf \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble.wav \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble-mvt1.wav \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble-mvt2.wav \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble-mvt3.wav \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble-appendix-a1.wav \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble-appendix-a2.wav \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble-appendix-a3.wav \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble-appendix-a4.wav \
            release/bird-im-migration-ensemble/bird-im-migration-ensemble-thumbnail.png
