name: Build And Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-modus-operandi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build Modus Operandi outputs
        run: python -m modus_operandi_abjad -o build

      - name: Install FluidSynth
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Render Modus Operandi WAV
        run: ./midi2wav.sh build/modus-operandi-abjad.midi build/modus-operandi-abjad.wav

      - name: Upload Modus Operandi artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modus-operandi-abjad
          path: |
            build/modus-operandi-abjad.ly
            build/modus-operandi-abjad.pdf
            build/modus-operandi-abjad.midi
            build/modus-operandi-abjad.wav

  build-jazz-rhythms:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build Jazz Rhythms outputs
        run: python -m jazz_rhythm -o build

      - name: Upload Jazz Rhythms artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jazz-rhythms
          path: |
            build/jazz-rhythms.ly
            build/jazz-rhythms.pdf
            build/jazz-rhythms.midi

  build-piano-quartet-study:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Build Piano Quartet Study outputs
        run: python -m algorithmic_piano_quartet -c configs/algorithmic-piano-quartet.toml -o build --pdf --wav

      - name: Upload Piano Quartet Study artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piano-quartet-study
          path: |
            build/algo-rhythms-quartet-no-1*.ly
            build/algo-rhythms-quartet-no-1*.pdf
            build/algo-rhythms-quartet-no-1*.midi
            build/algo-rhythms-quartet-no-1*.wav

  build-piano-quartet-no2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y fluidsynth ffmpeg

      - name: Build Piano Quartet No. 2 outputs
        run: python -m algorithmic_piano_quartet_no2 -c configs/algorithmic-piano-quartet-no2.toml -o build --pdf --wav

      - name: Upload Piano Quartet No. 2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piano-quartet-no2
          path: |
            build/algorithmic-piano-quartet-no-2*.ly
            build/algorithmic-piano-quartet-no-2*.pdf
            build/algorithmic-piano-quartet-no-2*.midi
            build/algorithmic-piano-quartet-no-2*.wav

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-modus-operandi
      - build-jazz-rhythms
      - build-piano-quartet-study
      - build-piano-quartet-no2
    runs-on: ubuntu-latest

    steps:
      - name: Download Modus Operandi artifacts
        uses: actions/download-artifact@v4
        with:
          name: modus-operandi-abjad
          path: release/modus-operandi-abjad

      - name: Download Jazz Rhythms artifacts
        uses: actions/download-artifact@v4
        with:
          name: jazz-rhythms
          path: release/jazz-rhythms

      - name: Download Piano Quartet Study artifacts
        uses: actions/download-artifact@v4
        with:
          name: piano-quartet-study
          path: release/piano-quartet-study

      - name: Download Piano Quartet No. 2 artifacts
        uses: actions/download-artifact@v4
        with:
          name: piano-quartet-no2
          path: release/piano-quartet-no2

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/modus-operandi-abjad/modus-operandi-abjad.pdf \
            release/modus-operandi-abjad/modus-operandi-abjad.midi \
            release/modus-operandi-abjad/modus-operandi-abjad.ly \
            release/modus-operandi-abjad/modus-operandi-abjad.wav \
            release/jazz-rhythms/jazz-rhythms.pdf \
            release/jazz-rhythms/jazz-rhythms.midi \
            release/jazz-rhythms/jazz-rhythms.ly \
            release/piano-quartet-study/algo-rhythms-quartet-no-1*.pdf \
            release/piano-quartet-study/algo-rhythms-quartet-no-1*.midi \
            release/piano-quartet-study/algo-rhythms-quartet-no-1*.ly \
            release/piano-quartet-study/algo-rhythms-quartet-no-1*.wav \
            release/piano-quartet-no2/algorithmic-piano-quartet-no-2*.pdf \
            release/piano-quartet-no2/algorithmic-piano-quartet-no-2*.midi \
            release/piano-quartet-no2/algorithmic-piano-quartet-no-2*.ly \
            release/piano-quartet-no2/algorithmic-piano-quartet-no-2*.wav
