name: Build And Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-modus-operandi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build Modus Operandi outputs
        run: python -m modus_operandi_abjad -o build

      - name: Install FluidSynth
        run: sudo apt-get update && sudo apt-get install -y fluidsynth

      - name: Render Modus Operandi WAV
        run: ./midi2wav.sh build/modus-operandi-abjad.midi build/modus-operandi-abjad.wav

      - name: Upload Modus Operandi artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modus-operandi-abjad
          path: |
            build/modus-operandi-abjad.ly
            build/modus-operandi-abjad.pdf
            build/modus-operandi-abjad.midi
            build/modus-operandi-abjad.wav

  build-jazz-rhythms:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build Jazz Rhythms outputs
        run: python -m jazz_rhythm -o build

      - name: Upload Jazz Rhythms artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jazz-rhythms
          path: |
            build/jazz-rhythms.ly
            build/jazz-rhythms.pdf
            build/jazz-rhythms.midi

  build-piano-quartet-study:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install FluidSynth
        run: sudo apt-get update && sudo apt-get install -y fluidsynth

      - name: Build Piano Quartet Study outputs
        run: python -m atonal_piano_quartet -c piano-quartet.toml -o build --pdf --midi

      - name: Render Piano Quartet Study WAV
        run: |
          midi_file=$(find build -maxdepth 1 -type f -name 'atonal-piano-quartet*.midi' | head -n 1)
          wav_file="${midi_file%.midi}.wav"
          ./midi2wav.sh "$midi_file" "$wav_file"

      - name: Upload Piano Quartet Study artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piano-quartet-study
          path: |
            build/atonal-piano-quartet*.ly
            build/atonal-piano-quartet*.pdf
            build/atonal-piano-quartet*.midi
            build/atonal-piano-quartet*.wav

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-modus-operandi
      - build-jazz-rhythms
      - build-piano-quartet-study
    runs-on: ubuntu-latest

    steps:
      - name: Download Modus Operandi artifacts
        uses: actions/download-artifact@v4
        with:
          name: modus-operandi-abjad
          path: release/modus-operandi-abjad

      - name: Download Jazz Rhythms artifacts
        uses: actions/download-artifact@v4
        with:
          name: jazz-rhythms
          path: release/jazz-rhythms

      - name: Download Piano Quartet Study artifacts
        uses: actions/download-artifact@v4
        with:
          name: piano-quartet-study
          path: release/piano-quartet-study

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/modus-operandi-abjad/modus-operandi-abjad.pdf \
            release/modus-operandi-abjad/modus-operandi-abjad.midi \
            release/modus-operandi-abjad/modus-operandi-abjad.ly \
            release/modus-operandi-abjad/modus-operandi-abjad.wav \
            release/jazz-rhythms/jazz-rhythms.pdf \
            release/jazz-rhythms/jazz-rhythms.midi \
            release/jazz-rhythms/jazz-rhythms.ly \
            release/piano-quartet-study/atonal-piano-quartet*.pdf \
            release/piano-quartet-study/atonal-piano-quartet*.midi \
            release/piano-quartet-study/atonal-piano-quartet*.ly \
            release/piano-quartet-study/atonal-piano-quartet*.wav
